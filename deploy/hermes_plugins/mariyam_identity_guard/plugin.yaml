name: mariyam_identity_guard
version: "1.0.3"
description: >-
  Deterministic Telegram session -> internal users.id guard for all
  user-scoped Mariyam MCP tools. Rewrites tool arguments by the current
  Telegram session identity from a private mapping. Fail-closed: unknown
  sender or missing mapping blocks the tool instead of calling it; a second
  barrier blocks Hermes' fallback if the primary callback itself fails.
  Recognizes live MCP-prefixed names (mcp__mariyam_backend__*) as bare tools.
  ensure_user binds telegram_id as integer (origin may store string).
author: Hermes/Mariyam
